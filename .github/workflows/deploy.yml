name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-app .

      - name: Stop old container
        run: docker stop devops-app
        continue-on-error: true

      - name: Remove old container
        run: docker rm devops-app
        continue-on-error: true

      - name: Run container
        run: docker run -d -p 3000:3000 --name devops-app devops-app
